<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kyoto 2026">
  <title>2026 京都家族旅行</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #FDF8F5; -webkit-tap-highlight-color: transparent; padding-bottom: 120px !important; }
    ::-webkit-scrollbar { display: none; }
    .pb-safe { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
    .page-hidden { display: none !important; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    input, select { -webkit-appearance: none; }
  </style>
</head>
<body class="text-gray-800 pb-24">

  <header class="bg-[#E6D5C3] text-center pt-4 pb-2 rounded-b-[30px] shadow-sm sticky top-0 z-10 transition-all">
    <h1 id="header-title" class="text-xl font-bold text-gray-800 tracking-wide">Kyoto 2026</h1>
    <div class="flex overflow-x-auto mt-3 px-4 gap-3 pb-2 hide-scrollbar" id="date-tabs">
      <button onclick="changeDate('2026/06/07', this)" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold bg-white text-[#C6A682] shadow-sm">Day 1</button>
      <button onclick="changeDate('2026/06/08', this)" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold text-gray-500">Day 2</button>
      <button onclick="changeDate('2026/06/09', this)" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold text-gray-500">Day 3</button>
      <button onclick="changeDate('2026/06/10', this)" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold text-gray-500">Day 4</button>
      <button onclick="changeDate('2026/06/11', this)" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold text-gray-500">Day 5</button>
    </div>
  </header>

  <main id="page-itinerary" class="p-5 space-y-4">
    <div id="itinerary-list"></div>
  </main>

  <main id="page-guide" class="p-5 space-y-4 page-hidden">
    <div id="guide-list"></div>
  </main>

  <main id="page-accounting" class="p-5 page-hidden">
    <div class="bg-white p-6 rounded-3xl shadow-sm">
      <div id="status-msg" class="hidden mb-4 p-3 rounded-xl text-center text-sm font-bold"></div>
      <form id="expense-form" class="space-y-5">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-[10px] text-gray-400 mb-1">日期</label><input type="date" id="exp-date" class="w-full bg-gray-50 rounded-xl px-3 py-2 text-sm outline-none" value="2026-06-07"></div>
          <div><label class="block text-[10px] text-gray-400 mb-1">分類</label><select id="exp-category" class="w-full bg-gray-50 rounded-xl px-3 py-2 text-sm outline-none"><option value="食物">🍜 食物</option><option value="購物">🛍️ 購物</option><option value="交通">🚃 交通</option><option value="住宿">🏨 住宿</option></select></div>
        </div>
        <div><label class="block text-[10px] text-gray-400 mb-1">花費項目</label><input type="text" id="exp-item" placeholder="例如：鰻魚飯" class="w-full bg-gray-50 rounded-xl px-4 py-3 text-sm outline-none"></div>
        <div class="flex gap-3">
          <div class="w-1/3"><label class="block text-[10px] text-gray-400 mb-1">幣別</label><select id="exp-currency" class="w-full bg-gray-50 rounded-xl px-3 py-3 text-sm font-bold outline-none"><option value="JPY">¥ JPY</option><option value="TWD">$ TWD</option></select></div>
          <div class="w-2/3"><label class="block text-[10px] text-gray-400 mb-1">金額</label><input type="number" id="exp-amount" placeholder="0" class="w-full bg-gray-50 rounded-xl px-4 py-3 text-lg font-bold outline-none"></div>
        </div>
        <button type="button" onclick="sendData()" id="submit-btn" class="w-full bg-[#C6A682] text-white font-bold rounded-xl py-3.5 shadow-md active:scale-95 transition-all">送出記帳</button>
      </form>
    </div>
  </main>

  <nav class="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-md border-t border-gray-100 flex justify-around pt-3 pb-5 pb-safe shadow-[0_-10px_20px_rgba(0,0,0,0.05)] rounded-t-3xl z-[99]">
    <button onclick="switchTab('itinerary', this)" class="nav-btn text-[#C6A682] font-bold flex flex-col items-center"><span class="text-2xl mb-1">📅</span><span class="text-xs">行程</span></button>
    <button onclick="switchTab('guide', this)" class="nav-btn text-gray-300 flex flex-col items-center"><span class="text-2xl mb-1">📝</span><span class="text-xs">指南</span></button>
    <button onclick="switchTab('accounting', this)" class="nav-btn text-gray-300 flex flex-col items-center"><span class="text-2xl mb-1">💰</span><span class="text-xs">記帳</span></button>
  </nav>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz15YO769Vw04uqb1Y8RXinVEHVNNj8QnwVP0K-aeoRzCQGsqfxmjGJhj9Vktkxw-WB3A/exec"; 
    let globalItinerary = [];
    let globalGuide = [];
    let currentDate = "2026/06/07";

    async function loadData() {
      // 優先載入快取
      const cached = localStorage.getItem('kyoto_data');
      if (cached) {
        const d = JSON.parse(cached);
        globalItinerary = d.itinerary;
        globalGuide = d.guide;
        renderItinerary();
        renderGuide();
      }

      try {
        const res = await fetch(API_URL);
        const result = await res.json();
        if(result.status === "success") {
          globalItinerary = result.itinerary;
          globalGuide = result.guide;
          localStorage.setItem('kyoto_data', JSON.stringify(result));
          renderItinerary();
          renderGuide();
        }
      } catch (e) {}
    }

    function renderGuide() {
      const container = document.getElementById('guide-list');
      container.innerHTML = '';
      globalGuide.forEach(item => {
        const card = `
          <div class="bg-white p-5 rounded-3xl shadow-sm mb-4">
            <div class="flex items-center gap-3 mb-2">
              <span class="text-2xl">${item.Icon || '📌'}</span>
              <h3 class="font-bold text-gray-800">${item.Title}</h3>
            </div>
            <p class="text-sm text-gray-500 mb-3">${item.Description || ''}</p>
            ${item.Link_URL ? `<a href="${item.Link_URL}" target="_blank" class="inline-block bg-[#FDF8F5] text-[#C6A682] text-xs font-bold px-4 py-2 rounded-xl border border-[#E6D5C3]">開啟連結</a>` : ''}
          </div>
        `;
        container.innerHTML += card;
      });
    }

    // 行程渲染與 Tab 切換邏輯 (同前，但資料來源改為 globalItinerary)
    function renderItinerary() {
      const container = document.getElementById('itinerary-list');
      container.innerHTML = '';
      const daily = globalItinerary.filter(item => item.Date === currentDate);
      daily.forEach(item => {
        const card = `<div class="bg-white p-5 rounded-3xl shadow-sm mb-4">
          <div class="flex justify-between items-center mb-2"><div class="text-sm font-bold text-[#D4B59D]">${item.Start_Time} - ${item.End_Time}</div><div class="text-[10px] bg-gray-50 text-gray-400 px-2.5 py-1 rounded-lg">${item.Category}</div></div>
          <h3 class="text-[17px] font-bold text-gray-800 mb-1">${item.Subject}</h3>
          <p class="text-sm text-gray-500 mb-2">${item.Description || ''}</p>
          ${item.Transport_Hint ? `<div class="mt-2 bg-blue-50/50 text-blue-700 text-xs p-2.5 rounded-xl border border-blue-100">🚃 ${item.Transport_Hint}</div>` : ''}
        </div>`;
        container.innerHTML += card;
      });
    }

    function switchTab(id, btn) {
      document.querySelectorAll('main').forEach(m => m.classList.add('page-hidden'));
      document.getElementById('page-' + id).classList.remove('page-hidden');
      document.getElementById('date-tabs').style.display = id === 'itinerary' ? 'flex' : 'none';
      document.getElementById('header-title').innerText = id === 'itinerary' ? 'Kyoto 2026' : (id === 'guide' ? '旅行指南' : '新增記帳');
      document.querySelectorAll('.nav-btn').forEach(b => b.className = "nav-btn text-gray-300 flex flex-col items-center");
      btn.className = "nav-btn text-[#C6A682] font-bold flex flex-col items-center";
    }

    function changeDate(d, btn) {
      currentDate = d;
      document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold text-gray-500");
      btn.className = "tab-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold bg-white text-[#C6A682] shadow-sm";
      renderItinerary();
    }

    async function sendData() {
      // 記帳傳送邏輯與前版一致...
      const btn = document.getElementById('submit-btn');
      const data = {
        date: document.getElementById('exp-date').value,
        category: document.getElementById('exp-category').value,
        item: document.getElementById('exp-item').value,
        amount: document.getElementById('exp-amount').value,
        currency: document.getElementById('exp-currency').value
      };
      if(!data.item || !data.amount) return alert('請填寫完整資訊');
      btn.disabled = true; btn.innerText = "傳送中...";
      try {
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        document.getElementById('status-msg').innerText = "🎉 記帳成功！";
        document.getElementById('status-msg').className = "mb-4 p-3 rounded-xl text-center text-sm bg-green-100 text-green-700 block";
        document.getElementById('expense-form').reset();
      } catch (e) {}
      btn.disabled = false; btn.innerText = "送出記帳";
      setTimeout(() => document.getElementById('status-msg').classList.add('hidden'), 3000);
    }

    loadData();
  </script>
</body>
</html>
