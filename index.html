<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kyoto 2026">
  <title>2026 京都家族旅行</title>
  <link rel="apple-touch-icon" href="icon.jpg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #FDF8F5; -webkit-tap-highlight-color: transparent; padding-bottom: 120px !important; }
    ::-webkit-scrollbar { display: none; }
    .pb-safe { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
    .page-hidden { display: none !important; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    input[type="date"], input[type="text"], input[type="number"], select { -webkit-appearance: none; }
    
    /* 自訂打勾核取方塊樣式 */
    .checkbox-custom {
      appearance: none; background-color: #fff; margin: 0; font: inherit; color: currentColor;
      width: 1.25em; height: 1.25em; border: 2px solid #E6D5C3; border-radius: 0.35em;
      display: grid; place-content: center; transition: all 0.2s ease-in-out;
    }
    .checkbox-custom::before {
      content: ""; width: 0.65em; height: 0.65em; transform: scale(0); transition: 120ms transform ease-in-out;
      box-shadow: inset 1em 1em white; background-color: white; transform-origin: center;
      clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
    }
    .checkbox-custom:checked { background-color: #C6A682; border-color: #C6A682; }
    .checkbox-custom:checked::before { transform: scale(1); }
  </style>
</head>
<body class="text-gray-800 pb-24">

  <header class="bg-[#E6D5C3] text-center pt-4 pb-2 rounded-b-[30px] shadow-sm sticky top-0 z-10 transition-all">
    <h1 id="header-title" class="text-xl font-bold text-gray-800 tracking-wide">Kyoto 2026</h1>
    <div class="flex overflow-x-auto mt-3 px-4 gap-3 pb-2 hide-scrollbar" id="date-tabs">
      <button onclick="changeDate('2026/06/07', this)" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold bg-white text-[#C6A682] shadow-sm">Day 1</button>
      <button onclick="changeDate('2026/06/08', this)" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold text-gray-500">Day 2</button>
      <button onclick="changeDate('2026/06/09', this)" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold text-gray-500">Day 3</button>
      <button onclick="changeDate('2026/06/10', this)" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold text-gray-500">Day 4</button>
      <button onclick="changeDate('2026/06/11', this)" class="tab-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold text-gray-500">Day 5</button>
    </div>
  </header>

  <main id="page-itinerary" class="p-5 space-y-4">
    <div id="itinerary-list"><div class="text-center text-gray-400 py-10">正在同步資料中... 🍵</div></div>
  </main>

  <main id="page-guide" class="p-5 space-y-4 page-hidden">
    <div id="guide-list"></div>
  </main>

  <main id="page-checklist" class="p-5 space-y-4 page-hidden">
    <div id="checklist-list"></div>
  </main>

  <main id="page-shopping" class="p-5 space-y-4 page-hidden">
    <div id="shopping-list"></div>
  </main>

  <main id="page-accounting" class="p-5 page-hidden">
    <div class="bg-white p-6 rounded-3xl shadow-sm">
      <div id="status-msg" class="hidden mb-4 p-3 rounded-xl text-center text-sm font-bold"></div>
      <form id="expense-form" class="space-y-5">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-[10px] text-gray-400 mb-1">日期</label><input type="date" id="exp-date" class="w-full bg-gray-50 rounded-xl px-3 py-2 text-sm outline-none" value="2026-06-07"></div>
          <div><label class="block text-[10px] text-gray-400 mb-1">分類</label><select id="exp-category" class="w-full bg-gray-50 rounded-xl px-3 py-2 text-sm outline-none"><option value="食物">🍜 食物</option><option value="購物">🛍️ 購物</option><option value="交通">🚃 交通</option><option value="住宿">🏨 住宿</option></select></div>
        </div>
        <div><label class="block text-[10px] text-gray-400 mb-1">花費項目</label><input type="text" id="exp-item" placeholder="例如：鰻魚飯" class="w-full bg-gray-50 rounded-xl px-4 py-3 text-sm outline-none"></div>
        <div class="flex gap-3">
          <div class="w-1/3"><label class="block text-[10px] text-gray-400 mb-1">幣別</label><select id="exp-currency" class="w-full bg-gray-50 rounded-xl px-3 py-3 text-sm font-bold outline-none"><option value="JPY">¥ JPY</option><option value="TWD">$ TWD</option></select></div>
          <div class="w-2/3"><label class="block text-[10px] text-gray-400 mb-1">金額</label><input type="number" id="exp-amount" placeholder="0" class="w-full bg-gray-50 rounded-xl px-4 py-3 text-lg font-bold outline-none"></div>
        </div>
        <button type="button" onclick="sendData()" id="submit-btn" class="w-full bg-[#C6A682] text-white font-bold rounded-xl py-3.5 shadow-md active:scale-95 transition-all">送出記帳</button>
      </form>
    </div>
  </main>

  <nav class="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-md border-t border-gray-100 flex justify-around pt-3 pb-5 pb-safe shadow-[0_-10px_20px_rgba(0,0,0,0.05)] rounded-t-3xl z-[99]">
    <button onclick="switchTab('itinerary', this)" class="nav-btn text-[#C6A682] font-bold flex flex-col items-center w-1/5"><span class="text-2xl mb-1">📅</span><span class="text-[10px]">行程</span></button>
    <button onclick="switchTab('guide', this)" class="nav-btn text-gray-300 flex flex-col items-center w-1/5 transition-colors"><span class="text-2xl mb-1">📝</span><span class="text-[10px]">指南</span></button>
    <button onclick="switchTab('checklist', this)" class="nav-btn text-gray-300 flex flex-col items-center w-1/5 transition-colors"><span class="text-2xl mb-1">✅</span><span class="text-[10px]">檢查</span></button>
    <button onclick="switchTab('shopping', this)" class="nav-btn text-gray-300 flex flex-col items-center w-1/5 transition-colors"><span class="text-2xl mb-1">🛒</span><span class="text-[10px]">購物</span></button>
    <button onclick="switchTab('accounting', this)" class="nav-btn text-gray-300 flex flex-col items-center w-1/5 transition-colors"><span class="text-2xl mb-1">💰</span><span class="text-[10px]">記帳</span></button>
  </nav>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz15YO769Vw04uqb1Y8RXinVEHVNNj8QnwVP0K-aeoRzCQGsqfxmjGJhj9Vktkxw-WB3A/exec"; 
    
    let globalItinerary = [];
    let globalGuide = [];
    let globalChecklist = [];
    let globalShopping = [];
    let currentDate = "2026/06/07";

    async function loadData() {
      const cached = localStorage.getItem('kyoto_data');
      if (cached) {
        try {
          const d = JSON.parse(cached);
          globalItinerary = d.itinerary || [];
          globalGuide = d.guide || [];
          globalChecklist = d.checklist || [];
          globalShopping = d.shopping || [];
          renderAll();
        } catch (e) {
          console.error("快取解析錯誤", e);
        }
      }

      try {
        const res = await fetch(API_URL);
        const result = await res.json();
        if(result.status === "success") {
          globalItinerary = result.itinerary || [];
          globalGuide = result.guide || [];
          globalChecklist = result.checklist || [];
          globalShopping = result.shopping || [];
          localStorage.setItem('kyoto_data', JSON.stringify(result));
          renderAll(); 
        }
      } catch (e) {
        console.error("API 連線錯誤", e);
      }
    }

    function renderAll() {
      renderItinerary();
      renderGuide();
      renderChecklist();
      renderShopping();
    }

    function renderChecklist() {
      const container = document.getElementById('checklist-list');
      if (!container) return;
      container.innerHTML = '';

      if (!globalChecklist || globalChecklist.length === 0) {
        container.innerHTML = '<div class="text-center text-gray-400 py-10">尚未新增檢查項目 🧳</div>';
        return;
      }

      const groups = {};
      globalChecklist.forEach(item => {
        const cat = item.Category || item.category || '未分類';
        if(!groups[cat]) groups[cat] = [];
        groups[cat].push(item);
      });

      for (const [cat, items] of Object.entries(groups)) {
        let itemsHtml = items.map(item => {
          const itemName = item.Item || item.item || '未知項目';
          const note = item.Note || item.note || '';
          const status = item.Status || item.status; 
          const isChecked = (status === 'checked') ? 'checked' : '';
          const textStyle = (status === 'checked') ? 'line-through text-gray-400' : 'text-gray-800';

          return `
            <label class="flex items-start gap-3 p-3 hover:bg-gray-50 rounded-xl transition cursor-pointer">
              <input type="checkbox" class="checkbox-custom mt-0.5 flex-shrink-0" value="${itemName}" ${isChecked} onchange="toggleCheck(this)">
              <div class="flex-1">
                <div class="font-bold text-sm ${textStyle} item-text transition-colors duration-200">${itemName}</div>
                ${note ? `<div class="text-[11px] text-gray-500 mt-0.5 leading-tight">${note}</div>` : ''}
              </div>
            </label>
          `;
        }).join('');

        container.innerHTML += `<div class="bg-white p-4 rounded-3xl shadow-sm mb-4"><h3 class="text-xs font-bold text-[#C6A682] mb-2 px-2">${cat}</h3><div class="space-y-0.5">${itemsHtml}</div></div>`;
      }
    }

    function renderShopping() {
      const container = document.getElementById('shopping-list');
      if (!container) return;
      container.innerHTML = '';

      if (!globalShopping || globalShopping.length === 0) {
        container.innerHTML = '<div class="text-center text-gray-400 py-10">尚未新增購物項目 🛒</div>';
        return;
      }

      const groups = {};
      globalShopping.forEach(item => {
        const store = item.Store || item.store || '其他';
        if(!groups[store]) groups[store] = [];
        groups[store].push(item);
      });

      for (const [store, items] of Object.entries(groups)) {
        let itemsHtml = items.map(item => {
          const itemName = item.Item || item.item || '未知物品';
          const note = item.Note || item.note || '';
          const status = item.Status || item.status; 
          const isChecked = (status === 'checked') ? 'checked' : '';
          const textStyle = (status === 'checked') ? 'line-through text-gray-400' : 'text-gray-800';

          return `
            <label class="flex items-start gap-3 p-3 hover:bg-gray-50 rounded-xl transition cursor-pointer">
              <input type="checkbox" class="checkbox-custom mt-0.5 flex-shrink-0" value="${itemName}" ${isChecked} onchange="toggleShoppingCheck(this)">
              <div class="flex-1">
                <div class="font-bold text-sm ${textStyle} item-text transition-colors duration-200">${itemName}</div>
                ${note ? `<div class="text-[11px] text-gray-500 mt-0.5 leading-tight">${note}</div>` : ''}
              </div>
            </label>
          `;
        }).join('');

        container.innerHTML += `<div class="bg-white p-4 rounded-3xl shadow-sm mb-4"><h3 class="text-xs font-bold text-[#C6A682] mb-2 px-2">📍 ${store}</h3><div class="space-y-0.5">${itemsHtml}</div></div>`;
      }
    }

    async function toggleCheck(checkbox) {
      const itemName = checkbox.value;
      const isChecked = checkbox.checked;
      const textDiv = checkbox.nextElementSibling.querySelector('.item-text');
      if (isChecked) { textDiv.classList.add('line-through', 'text-gray-400'); textDiv.classList.remove('text-gray-800'); } 
      else { textDiv.classList.remove('line-through', 'text-gray-400'); textDiv.classList.add('text-gray-800'); }
      checkbox.disabled = true; 
      try { await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "toggle_check", item: itemName, status: isChecked ? "checked" : "" }) }); } 
      catch (e) { console.error("同步失敗", e); } finally { checkbox.disabled = false; }
    }

    async function toggleShoppingCheck(checkbox) {
      const itemName = checkbox.value;
      const isChecked = checkbox.checked;
      const textDiv = checkbox.nextElementSibling.querySelector('.item-text');
      if (isChecked) { textDiv.classList.add('line-through', 'text-gray-400'); textDiv.classList.remove('text-gray-800'); } 
      else { textDiv.classList.remove('line-through', 'text-gray-400'); textDiv.classList.add('text-gray-800'); }
      checkbox.disabled = true; 
      try { await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "toggle_shopping", item: itemName, status: isChecked ? "checked" : "" }) }); } 
      catch (e) { console.error("同步失敗", e); } finally { checkbox.disabled = false; }
    }

    function renderItinerary() {
      const container = document.getElementById('itinerary-list');
      if (!container) return;
      container.innerHTML = '';
      const daily = globalItinerary.filter(item => item.Date === currentDate);
      if(daily.length === 0) { container.innerHTML = '<div class="text-center text-gray-400 py-10">這天還沒有排行程喔 🍃</div>'; return; }
      
      daily.forEach(item => {
        const mapUrl = item.Map_URL || item.map_url || '';
        const backup = item.Backup || item.backup || '';
        
        container.innerHTML += `
        <div class="bg-white p-5 rounded-3xl shadow-sm mb-4 relative overflow-hidden">
          <div class="flex justify-between items-center mb-2">
            <div class="text-sm font-bold text-[#D4B59D]">${item.Start_Time || ''} - ${item.End_Time || ''}</div>
            <div class="text-[10px] bg-gray-50 text-gray-400 px-2.5 py-1 rounded-lg">${item.Category || ''}</div>
          </div>
          
          <h3 class="text-[17px] font-bold text-gray-800 mb-1 pr-12">${item.Subject || ''}</h3>
          <p class="text-sm text-gray-500 mb-2">${item.Description || ''}</p>
          
          ${item.Transport_Hint ? `<div class="mt-2 bg-blue-50/50 text-blue-700 text-xs p-2.5 rounded-xl border border-blue-100 flex items-start gap-2"><span>🚃</span> <span>${item.Transport_Hint}</span></div>` : ''}
          
          ${backup ? `<div class="mt-2 bg-green-50/50 text-green-800 text-xs p-2.5 rounded-xl border border-green-100 flex items-start gap-2"><span>💡</span> <span><b>備案：</b>${backup}</span></div>` : ''}
          
          ${mapUrl ? `<a href="${mapUrl}" target="_blank" class="absolute top-14 right-5 bg-[#FDF8F5] text-[#C6A682] border border-[#E6D5C3] rounded-full w-10 h-10 flex items-center justify-center text-lg shadow-sm active:scale-95 transition-transform">📍</a>` : ''}
        </div>`; // ✅ 這裡幫你把 </div>`; 補回來了！
      });
    }

    function renderGuide() {
      const container = document.getElementById('guide-list');
      if (!container) return;
      container.innerHTML = '';
      if (!globalGuide || globalGuide.length === 0) { container.innerHTML = '<div class="text-center text-gray-400 py-10">無指南資料</div>'; return; }
      globalGuide.forEach(item => {
        const title = item.Title || item.title || "未命名"; const desc = item.Description || item.description || "";
        const icon = item.Icon || item.icon || "📌"; const url = item.Link_URL || item.link_url || null;
        container.innerHTML += `<div class="bg-white p-5 rounded-3xl shadow-sm mb-4">
          <div class="flex items-center gap-3 mb-2"><span class="text-2xl">${icon}</span><h3 class="font-bold text-gray-800">${title}</h3></div>
          <p class="text-sm text-gray-500 mb-3">${desc}</p>
          ${url ? `<a href="${url}" target="_blank" class="inline-block bg-[#FDF8F5] text-[#C6A682] text-xs font-bold px-4 py-2 rounded-xl border border-[#E6D5C3]">開啟連結</a>` : ''}
        </div>`;
      });
    }

    function switchTab(id, btn) {
      document.querySelectorAll('main').forEach(m => m.classList.add('page-hidden'));
      document.getElementById('page-' + id).classList.remove('page-hidden');
      document.getElementById('date-tabs').style.display = id === 'itinerary' ? 'flex' : 'none';
      const titles = { 'itinerary': 'Kyoto 2026', 'guide': '旅行指南', 'checklist': '物品檢查', 'shopping': '購物清單', 'accounting': '新增記帳' };
      document.getElementById('header-title').innerText = titles[id];
      document.querySelectorAll('.nav-btn').forEach(b => b.className = "nav-btn text-gray-300 flex flex-col items-center w-1/5 transition-colors");
      btn.className = "nav-btn text-[#C6A682] font-bold flex flex-col items-center w-1/5 transition-colors";
    }

    function changeDate(d, btn) {
      currentDate = d;
      document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold text-gray-500");
      btn.className = "tab-btn flex-shrink-0 px-4 py-1.5 rounded-full text-sm font-bold bg-white text-[#C6A682] shadow-sm";
      renderItinerary();
    }

    async function sendData() {
      const btn = document.getElementById('submit-btn');
      const data = {
        action: "expense",
        date: document.getElementById('exp-date').value, category: document.getElementById('exp-category').value,
        item: document.getElementById('exp-item').value, amount: document.getElementById('exp-amount').value,
        currency: document.getElementById('exp-currency').value
      };
      if(!data.item || !data.amount) return alert('請填寫完整資訊');
      btn.disabled = true; btn.innerText = "傳送中...";
      try {
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        document.getElementById('status-msg').innerText = "🎉 記帳成功！";
        document.getElementById('status-msg').className = "mb-4 p-3 rounded-xl text-center text-sm bg-green-100 text-green-700 block";
        document.getElementById('expense-form').reset();
        document.getElementById('exp-date').value = "2026-06-07";
      } catch (e) {}
      btn.disabled = false; btn.innerText = "送出記帳";
      setTimeout(() => document.getElementById('status-msg').classList.add('hidden'), 3000);
    }

    loadData();
  </script>
</body>
</html>
